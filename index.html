<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GysTG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0f13;
            --surface: #1a1a24;
            --border: #2a2a32;
            --text: #eef2ff;
            --primary: #3b82f6;
            --gold: #fbbf24;
        }
        body.light {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --border: #e5e5ea;
            --text: #1a1a1e;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px;
            transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: var(--surface);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }
        .btn {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--border); color: var(--text); }
        .btn-danger { background: #ef4444; color: white; }
        input, textarea {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
        }
        .logo { font-size: 28px; font-weight: bold; }
        .big-logo { font-size: 48px; font-weight: bold; text-align: center; margin-bottom: 40px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .balance {
            background: var(--gold);
            color: #000;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            margin: 0 auto 16px;
            background-size: cover;
            background-position: center;
        }
        .avatar-small {
            width: 44px;
            height: 44px;
            font-size: 18px;
            margin: 0;
        }
        .username-at { color: var(--primary); font-family: monospace; font-size: 14px; }
        .user-item {
            background: var(--border);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .user-item:hover { background: var(--primary); }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 600px;
            margin: 0 auto;
            background: var(--surface);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px 24px;
            border-top: 1px solid var(--border);
            z-index: 100;
        }
        .nav-item {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: 0.2s;
        }
        .nav-item.active { color: var(--primary); }
        .auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 20px;
            padding: 20px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .status-online { background: #22c55e; }
        .status-offline { background: #8e8e93; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--surface);
            border-radius: 24px;
            padding: 24px;
            width: 320px;
        }
        .dev-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 200;
        }
        .flex-row { display: flex; align-items: center; gap: 12px; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const API_URL = window.location.origin;
        let currentUser = null;
        let usersList = [];
        
        async function checkSession() {
            let savedId = localStorage.getItem('userId');
            if (savedId) {
                try {
                    let res = await fetch(`${API_URL}/api/users`);
                    let users = await res.json();
                    let user = users.find(u => u.id === savedId);
                    if (user) {
                        currentUser = user;
                        await fetch(`${API_URL}/api/users/${currentUser.id}/online`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ is_online: true })
                        });
                        showMain();
                        return;
                    }
                } catch(e) { console.log(e); }
            }
            showAuth();
        }
        
        function showAuth() {
            document.getElementById('app').innerHTML = `
                <div class="auth-screen">
                    <div class="big-logo">GysTG</div>
                    <div class="card" style="width: 100%; max-width: 350px; text-align: center;">
                        <button class="btn btn-primary" style="width: 100%; margin-bottom: 12px;" onclick="showLogin()">Войти</button>
                        <button class="btn btn-secondary" style="width: 100%;" onclick="showRegister()">Зарегистрироваться</button>
                    </div>
                    <div id="formContainer" style="width: 100%; max-width: 350px;"></div>
                </div>
            `;
        }
        
        window.showLogin = function() {
            document.getElementById('formContainer').innerHTML = `
                <div class="card">
                    <input type="email" id="loginEmail" placeholder="Почта">
                    <input type="password" id="loginPass" placeholder="Пароль">
                    <button class="btn btn-primary" style="width: 100%;" onclick="doLogin()">Войти</button>
                </div>
            `;
        };
        
        window.showRegister = function() {
            document.getElementById('formContainer').innerHTML = `
                <div class="card">
                    <input type="email" id="regEmail" placeholder="Почта">
                    <input type="text" id="regName" placeholder="Имя">
                    <input type="text" id="regTag" placeholder="@юзернейм">
                    <input type="password" id="regPass" placeholder="Пароль">
                    <button class="btn btn-primary" style="width: 100%;" onclick="doRegister()">Зарегистрироваться</button>
                </div>
            `;
        };
        
        window.doLogin = async function() {
            let email = document.getElementById('loginEmail').value;
            let pass = document.getElementById('loginPass').value;
            
            let res = await fetch(`${API_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password: pass })
            });
            
            if (!res.ok) {
                alert('Неверный email или пароль');
                return;
            }
            
            currentUser = await res.json();
            localStorage.setItem('userId', currentUser.id);
            await fetch(`${API_URL}/api/users/${currentUser.id}/online`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_online: true })
            });
            await loadUsers();
            showMain();
        };
        
        window.doRegister = async function() {
            let email = document.getElementById('regEmail').value;
            let name = document.getElementById('regName').value;
            let tag = document.getElementById('regTag').value.trim();
            let pass = document.getElementById('regPass').value;
            
            if (!tag.startsWith('@')) tag = '@' + tag;
            
            let code = Math.floor(10000 + Math.random() * 90000);
            let userCode = prompt(`Код подтверждения: ${code}\nВведите код:`);
            if (userCode !== String(code)) {
                alert('Неверный код');
                return;
            }
            
            let res = await fetch(`${API_URL}/api/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, username: name, user_tag: tag, password: pass })
            });
            
            if (!res.ok) {
                let err = await res.json();
                alert(err.error);
                return;
            }
            
            currentUser = await res.json();
            localStorage.setItem('userId', currentUser.id);
            await fetch(`${API_URL}/api/users/${currentUser.id}/online`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_online: true })
            });
            await loadUsers();
            showMain();
        };
        
        async function loadUsers() {
            let res = await fetch(`${API_URL}/api/users`);
            usersList = await res.json();
        }
        
        function showMain() {
            let others = usersList.filter(u => u.id !== currentUser.id);
            let isDev = currentUser.email === 'savostinmatvej501@gmail.com';
            let theme = localStorage.getItem('theme') || 'dark';
            
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div class="flex-between" style="margin: 16px 0;">
                        <div class="logo">GysTG</div>
                        <div class="balance" onclick="alert('Магазин в разработке')">🪙 ${currentUser.balance}</div>
                    </div>
                    <div id="mainContent"></div>
                </div>
                <div class="bottom-nav">
                    <button class="nav-item" onclick="switchTab('chats')">💬</button>
                    <button class="nav-item" onclick="switchTab('settings')">⚙️</button>
                    <button class="nav-item" onclick="switchTab('profile')">👤</button>
                </div>
            `;
            
            if (isDev && !document.querySelector('.dev-btn')) {
                let btn = document.createElement('div');
                btn.className = 'dev-btn';
                btn.innerHTML = `<button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;" onclick="openDevPanel()">👨‍💻 DEV</button>`;
                document.body.appendChild(btn);
            }
            
            window.currentTab = 'profile';
            renderTabContent();
        }
        
        window.switchTab = function(tab) {
            window.currentTab = tab;
            renderTabContent();
        };
        
        function renderTabContent() {
            let div = document.getElementById('mainContent');
            if (!div) return;
            if (window.currentTab === 'chats') renderChats(div);
            else if (window.currentTab === 'settings') renderSettings(div);
            else if (window.currentTab === 'profile') renderProfile(div);
        }
        
        function renderProfile(div) {
            let isDev = currentUser.email === 'savostinmatvej501@gmail.com';
            div.innerHTML = `
                <div class="card" style="text-align: center;">
                    <div class="flex-between" style="margin-bottom: 16px;">
                        <button class="btn btn-secondary" style="padding: 8px 12px;" onclick="toggleTheme()">${localStorage.getItem('theme') === 'light' ? '🌙' : '☀️'}</button>
                    </div>
                    <div class="avatar" style="background-image: url('${currentUser.avatar || ''}'); background-size: cover;">
                        ${!currentUser.avatar ? currentUser.username[0].toUpperCase() : ''}
                    </div>
                    <h2>${escapeHtml(currentUser.username)}</h2>
                    <div class="username-at">${escapeHtml(currentUser.user_tag)}</div>
                    ${isDev ? '<span style="background:#fbbf24;color:#000;padding:2px 8px;border-radius:12px;font-size:10px;margin-left:8px;">dev</span>' : ''}
                    <p style="margin: 16px 0;">${escapeHtml(currentUser.bio || 'Ничего не написано')}</p>
                    <div class="balance" style="display: inline-block; margin-bottom: 16px;" onclick="alert('Магазин в разработке')">🪙 ${currentUser.balance}</div>
                    <div style="display: flex; gap: 12px;">
                        <label class="btn btn-secondary" style="flex:1; cursor: pointer;">📸 Фото<input type="file" accept="image/*" style="display:none" onchange="uploadAvatar(this)"></label>
                        <button class="btn btn-secondary" style="flex:1;" onclick="openEditProfile()">✏️ Ред</button>
                    </div>
                    <button class="btn btn-secondary" style="width:100%; margin-top: 16px;" onclick="logout()">Выйти</button>
                    <button class="btn btn-danger" style="width:100%; margin-top: 8px;" onclick="deleteAccount()">Удалить</button>
                </div>
            `;
        }
        
        function renderChats(div) {
            let others = usersList.filter(u => u.id !== currentUser.id);
            div.innerHTML = `
                <div class="card">
                    <input type="text" id="searchChat" placeholder="🔍 Поиск..." onkeyup="filterChats()">
                </div>
                <div id="chatList">
                    ${others.map(u => `
                        <div class="user-item" onclick="alert('Чат с ${u.username} в разработке')">
                            <div>
                                <strong>${escapeHtml(u.username)}</strong>
                                <div class="username-at">${escapeHtml(u.user_tag)}</div>
                            </div>
                            <div>
                                <span class="status-dot ${u.is_online ? 'status-online' : 'status-offline'}"></span>
                                🪙 ${u.balance}
                            </div>
                        </div>
                    `).join('')}
                    ${others.length === 0 ? '<div class="card" style="text-align:center;">Нет других пользователей</div>' : ''}
                </div>
            `;
        }
        
        window.filterChats = function() {
            let search = document.getElementById('searchChat').value.toLowerCase();
            let others = usersList.filter(u => u.id !== currentUser.id);
            let filtered = others.filter(u => u.username.toLowerCase().includes(search));
            let listDiv = document.getElementById('chatList');
            if (listDiv) {
                listDiv.innerHTML = filtered.map(u => `
                    <div class="user-item" onclick="alert('Чат с ${u.username} в разработке')">
                        <div>
                            <strong>${escapeHtml(u.username)}</strong>
                            <div class="username-at">${escapeHtml(u.user_tag)}</div>
                        </div>
                        <div>
                            <span class="status-dot ${u.is_online ? 'status-online' : 'status-offline'}"></span>
                            🪙 ${u.balance}
                        </div>
                    </div>
                `).join('');
                if (filtered.length === 0) listDiv.innerHTML = '<div class="card" style="text-align:center;">Пользователь не найден</div>';
            }
        };
        
        function renderSettings(div) {
            div.innerHTML = `
                <div class="card">
                    <h3>⚙️ Настройки</h3>
                    <button class="btn btn-secondary" style="width:100%; margin-bottom: 16px;" onclick="alert('Скоро')">🔒 Конфиденциальность</button>
                    <p>Версия: 1.0</p>
                    <button class="btn btn-secondary" style="width:100%; margin-top: 16px;" onclick="logout()">Выйти</button>
                </div>
            `;
        }
        
        window.openDevPanel = async function() {
            if (currentUser.email !== 'savostinmatvej501@gmail.com') return;
            let modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content" style="width: 90%; max-width: 500px;">
                    <h3>👨‍💻 Панель разработчика</h3>
                    <div style="max-height: 400px; overflow-y: auto;">
                        ${usersList.map(u => `
                            <div class="flex-between" style="margin-bottom: 12px; padding: 8px; background: var(--border); border-radius: 12px;">
                                <div>
                                    <strong>${escapeHtml(u.username)}</strong>
                                    <div style="font-size: 12px;">${escapeHtml(u.email)}</div>
                                    <div>💰 ${u.balance}</div>
                                </div>
                                ${u.id !== currentUser.id ? `
                                    <div class="flex-row">
                                        <input type="number" id="amount_${u.id}" placeholder="Сумма" style="width: 70px; padding: 4px; border-radius: 20px;">
                                        <button class="btn btn-primary" style="padding: 4px 8px;" onclick="giveCoins('${u.id}')">💰</button>
                                    </div>
                                ` : '<span>Вы</span>'}
                            </div>
                        `).join('')}
                    </div>
                    <button class="btn btn-secondary" style="width:100%; margin-top: 16px;" onclick="closeModal()">Закрыть</button>
                </div>
            `;
            document.body.appendChild(modal);
        };
        
        window.giveCoins = async function(userId) {
            let amount = parseInt(document.getElementById(`amount_${userId}`).value);
            if (!amount || amount <= 0) {
                alert('Введите сумму');
                return;
            }
            await fetch(`${API_URL}/api/users/${userId}/balance`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: amount })
            });
            alert(`Выдано ${amount} монет`);
            closeModal();
            openDevPanel();
            await loadUsers();
            renderTabContent();
        };
        
        window.uploadAvatar = async function(input) {
            let file = input.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = async (e) => {
                    await fetch(`${API_URL}/api/users/${currentUser.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ avatar: e.target.result })
                    });
                    currentUser.avatar = e.target.result;
                    renderTabContent();
                };
                reader.readAsDataURL(file);
            }
        };
        
        window.openEditProfile = function() {
            let modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>Редактировать</h3>
                    <input type="text" id="editName" value="${escapeHtml(currentUser.username)}" placeholder="Имя">
                    <input type="text" id="editTag" value="${escapeHtml(currentUser.user_tag)}" placeholder="@юзернейм">
                    <textarea id="editBio" rows="3" placeholder="О себе">${escapeHtml(currentUser.bio || '')}</textarea>
                    <button class="btn btn-primary" style="width:100%; margin-top: 8px;" onclick="saveProfile()">Сохранить</button>
                    <button class="btn btn-secondary" style="width:100%; margin-top: 8px;" onclick="closeModal()">Отмена</button>
                </div>
            `;
            document.body.appendChild(modal);
        };
        
        window.saveProfile = async function() {
            let newName = document.getElementById('editName').value;
            let newTag = document.getElementById('editTag').value.trim();
            let newBio = document.getElementById('editBio').value;
            
            if (!newTag.startsWith('@')) newTag = '@' + newTag;
            
            let res = await fetch(`${API_URL}/api/users/${currentUser.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: newName, user_tag: newTag, bio: newBio })
            });
            
            if (res.ok) {
                currentUser.username = newName;
                currentUser.user_tag = newTag;
                currentUser.bio = newBio;
                closeModal();
                renderTabContent();
                await loadUsers();
            } else {
                alert('Имя или @юзернейм заняты');
            }
        };
        
        window.toggleTheme = function() {
            let theme = localStorage.getItem('theme') === 'light' ? 'dark' : 'light';
            localStorage.setItem('theme', theme);
            if (theme === 'light') document.body.classList.add('light');
            else document.body.classList.remove('light');
            renderTabContent();
        };
        
        window.logout = async function() {
            if (confirm('Выйти?')) {
                await fetch(`${API_URL}/api/users/${currentUser.id}/online`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ is_online: false })
                });
                currentUser = null;
                localStorage.removeItem('userId');
                showAuth();
            }
        };
        
        window.deleteAccount = async function() {
            if (confirm('Удалить навсегда?')) {
                alert('В разработке');
            }
        };
        
        window.closeModal = function() {
            let modal = document.querySelector('.modal');
            if (modal) modal.remove();
        };
        
        function escapeHtml(s) {
            if (!s) return '';
            let d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }
        
        let savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') document.body.classList.add('light');
        
        checkSession();
    </script>
</body>
  </html>
